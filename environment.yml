# Conda 环境：支持 Python 3.9–3.11，推荐 3.11
# 创建环境: conda env create -f environment.yml
# 激活环境: conda activate fots_tactile
# 然后安装: pip install -r requirements-py311.txt

name: fots_tactile
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy>=1.24,<2
  - scipy>=1.9,<1.14
  - scikit-learn>=1.1,<1.5
  - pandas>=1.4,<2.2
  - matplotlib>=3.5,<3.9
  - pillow>=9.2,<11
  - pyudev>=0.23
  - pip:
    - opencv-python>=4.5.3,<4.10
    - torch>=2.0,<2.5
    - torchvision>=0.15,<0.20
    - open3d>=0.15,<0.19
    - imageio>=2.21,<2.35
    - tqdm>=4.64,<5
    - wandb>=0.13,<0.18
    - hydra-core>=1.2,<1.3
    - PyQt5>=5.15
    - certifi>=2022.6
    - six>=1.16
